<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;

    background:
    radial-gradient(circle at top left,#3b82f6 0%,transparent 35%),
    radial-gradient(circle at bottom right,#8b5cf6 0%,transparent 35%),
    linear-gradient(135deg,#0f172a,#111827);

    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:24px;

    padding:35px 25px;
    text-align:center;

    box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.3);
    object-fit:cover;
    margin-bottom:15px;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

p{
    color:#cbd5e1;
    margin-bottom:25px;
}

.link{
    display:block;
    padding:16px;
    margin:14px 0;

    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    text-decoration:none;
    font-weight:600;

    border-radius:16px;
    cursor:pointer;
    transition:all .3s ease;
}

.link:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.2);
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111827;
    padding:25px;
    border-radius:16px;
    width:90%;
    max-width:350px;
    text-align:center;
}

.modal-content input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

.modal-content button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<img src="profile.jpg" class="profile">

<h1>Roly Florentino</h1>
<p>Welcome to my page ✨</p>

<a class="link" onclick="openModal()">
💬 Ask me on NGL
</a>

<a class="link" href="https://bit.ly/A-Privilege" target="_blank">
🎵 My Spotify Playlist
</a>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Before you continue</h3>
    <p>Enter your username</p>

    <input type="text" id="username" placeholder="Username">

    <button onclick="sendAndRedirect()">
    Continue
    </button>

  </div>
</div>

<script>

// 🔥 GOOGLE SHEETS WEB APP URL (ILAGAY MO DITO)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1nWeZwALF5MweSwYyUzkaf_Gnq8jLzmSbiXs5EXHHwPygMEu2Cp8BVX6IEJI3XWt8/exec";

function openModal(){
    document.getElementById("modal").style.display = "flex";
}

async function sendAndRedirect(){

    const username =
    document.getElementById("username").value.trim();

    if(!username){
        alert("Enter username");
        return;
    }

    // DEVICE INFO DETECTION
    const userAgent = navigator.userAgent;

const device = /Mobi|Android|iPhone/i.test(userAgent)
  ? "Mobile"
  : "Desktop";

let browser = "Unknown";
if (userAgent.includes("Chrome")) browser = "Chrome";
else if (userAgent.includes("Firefox")) browser = "Firefox";
else if (userAgent.includes("Safari") && !userAgent.includes("Chrome")) browser = "Safari";
else if (userAgent.includes("Edg")) browser = "Edge";

let os = "Unknown";
if (userAgent.includes("Windows")) os = "Windows";
else if (userAgent.includes("Android")) os = "Android";
else if (userAgent.includes("iPhone") || userAgent.includes("iOS")) os = "iPhone";
else if (userAgent.includes("Mac")) os = "MacOS";

    // SEND TO GOOGLE SHEETS
    await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            username: username,
            device: device,
            browser: browser,
            os: os
        })
    });

    window.location.href = "https://ngl.link/rflorentino_";
}

</script>

</body>
</html>
