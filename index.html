<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;

    background:
    radial-gradient(circle at top left,#3b82f6 0%,transparent 35%),
    radial-gradient(circle at bottom right,#8b5cf6 0%,transparent 35%),
    linear-gradient(135deg,#0f172a,#111827);

    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:24px;

    padding:35px 25px;
    text-align:center;

    box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.3);
    object-fit:cover;
    margin-bottom:15px;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

p{
    color:#cbd5e1;
    margin-bottom:25px;
}

.link{
    display:block;
    padding:16px;
    margin:14px 0;

    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    text-decoration:none;
    font-weight:600;

    border-radius:16px;
    cursor:pointer;
    transition:all .3s ease;
}

.link:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.2);
}
</style>

</head>

<body>

<div class="container">

<img src="profile.jpg" class="profile">

<h1>Roly Florentino</h1>
<p>Welcome to my page ✨</p>

<a class="link" href="https://urlto.me/2LqQ6" target="_blank">
💬 Ask me anything on NGL.
</a>

<a class="link" href="https://open.spotify.com/playlist/0gIg7sFEfQE1DemfhGhALz" target="_blank">
🎵 My Spotify Playlist
</a>

</div>

</body>
</html>
