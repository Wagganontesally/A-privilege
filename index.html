<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#7c3aed);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
}

h1{
    margin-top:15px;
}

.link{
    display:block;
    padding:15px;
    margin:12px 0;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:15px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.link:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.25);
}
</style>
</head>

<body>

<div class="container">

<img src="profile.jpg" class="profile">

<h1>Roly Florentino</h1>
<p>Welcome to my page ✨</p>

<a class="link" href="https://bit.ly/rflorentino_" target="_blank">
💬 Ask me on NGL
</a>

<a class="link" href="https://bit.ly/A-Privilege" target="_blank">
🎵 My Spotify Playlist
</a>

</div>

</body>
</html>
