<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
    overflow:hidden;
}

/* Background Video */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Dark Overlay */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

.container{
    width:100%;
    max-width:420px;

    background:transparent;
    backdrop-filter:blur(5px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:24px;

    padding:35px 25px;
    text-align:center;

    box-shadow:none;
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.3);
    object-fit:cover;
    margin-bottom:15px;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

p{
    color:#cbd5e1;
    margin-bottom:25px;
}

.link{
    display:block;
    padding:16px;
    margin:14px 0;

    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    text-decoration:none;
    font-weight:600;

    border-radius:16px;
    cursor:pointer;
    transition:all .3s ease;
}

.link:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.2);
}
</style>

</head>

<body>

<!-- Background Video -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="background.mp4" type="video/mp4">
</video>

<div class="container">

    <img src="profile.jpg" class="profile">

    <h1>Roly Florentino</h1>
    <p>Welcome to my page ✨</p>

    <a class="link" href="https://urlto.me/2LqQ6" target="_blank">
        💬 Ask me anything on NGL.
    </a>

    <a class="link" href="https://open.spotify.com/playlist/0gIg7sFEfQE1DemfhGhALz" target="_blank">
        🎵 My Spotify Playlist
    </a>

</div>

</body>
</html>
